<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郵便番号検索</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 16px 60px;
  }

  .container { width: 100%; max-width: 520px; margin: 0 auto; }

  /* ヒーロー */
  .hero { text-align: center; margin-bottom: 28px; }
  .hero-icon { font-size: 2.8rem; display: block; margin-bottom: 10px; }
  .hero h1 { font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
  .hero p  { font-size: 0.88rem; color: rgba(255,255,255,0.75); }

  /* カード共通 */
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 検索 */
  .input-wrap { position: relative; margin-bottom: 12px; }

  .input-wrap input {
    width: 100%;
    padding: 16px 48px 16px 20px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 1.4rem;
    font-family: inherit;
    letter-spacing: 4px;
    text-align: center;
    outline: none;
    color: #2d3748;
    background: #f7f8fa;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap input:focus {
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  }

  .input-wrap input::placeholder { color: #c0c0c0; letter-spacing: 2px; font-size: 1.1rem; }

  .clear-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: #e2e8f0; border: none; border-radius: 50%;
    width: 28px; height: 28px; font-size: 0.8rem; cursor: pointer;
    color: #718096; display: none; align-items: center; justify-content: center;
  }
  .clear-btn.show { display: flex; }
  .clear-btn:hover { background: #cbd5e0; }

  .search-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 800; letter-spacing: 1px;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .search-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 住所結果 */
  .addr-zip  { font-size: 0.8rem; font-weight: 700; color: #a0aec0; letter-spacing: 2px; text-align: center; margin-bottom: 12px; }
  .addr-body { text-align: center; margin-bottom: 16px; }
  .addr-pref { font-size: 1rem; color: #667eea; font-weight: 700; margin-bottom: 2px; }
  .addr-city { font-size: 1.9rem; font-weight: 900; color: #2d3748; line-height: 1.3; margin-bottom: 2px; }
  .addr-town { font-size: 1.1rem; color: #4a5568; font-weight: 600; }

  .copy-btn {
    width: 100%; padding: 11px; background: #f7f8fa;
    border: 2px solid #e2e8f0; border-radius: 10px;
    font-size: 0.88rem; font-weight: 700; color: #4a5568; cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover  { background: #edf2f7; border-color: #667eea; color: #667eea; }
  .copy-btn.copied { background: #f0fff4; border-color: #48bb78; color: #38a169; }

  /* 天気 */
  .weather-title {
    font-size: 0.78rem; font-weight: 700; color: #a0aec0;
    letter-spacing: 2px; margin-bottom: 14px; text-align: center;
  }

  .weather-now {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 20px;
  }

  .weather-icon-big { font-size: 3.2rem; }

  .weather-now-info { text-align: left; }
  .weather-temp { font-size: 2.4rem; font-weight: 900; color: #2d3748; }
  .weather-desc { font-size: 0.92rem; color: #718096; margin-top: 2px; }

  .weather-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 20px;
  }

  .weather-item {
    background: #f7f8fa; border-radius: 10px;
    padding: 12px 8px; text-align: center;
  }

  .weather-item-label { font-size: 0.72rem; color: #a0aec0; font-weight: 700; margin-bottom: 4px; }
  .weather-item-value { font-size: 1rem; font-weight: 800; color: #2d3748; }

  /* 地図 */
  .map-title {
    font-size: 0.78rem; font-weight: 700; color: #a0aec0;
    letter-spacing: 2px; margin-bottom: 12px; text-align: center;
  }

  #map {
    width: 100%; height: 260px;
    border-radius: 12px; overflow: hidden;
    border: 2px solid #e2e8f0;
  }

  /* エラー */
  .error-card {
    background: #fff5f5; border: 2px solid #feb2b2;
    border-radius: 16px; padding: 20px; text-align: center;
    display: none; animation: fadeUp 0.3s ease;
  }
  .error-card.show { display: block; }
  .error-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .error-text { color: #c53030; font-weight: 700; font-size: 0.92rem; }

  /* スピナー */
  .spinner { display: none; justify-content: center; padding: 20px 0; }
  .spinner.show { display: flex; }
  .spinner-ring {
    width: 36px; height: 36px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <span class="hero-icon">📮</span>
    <h1>郵便番号検索</h1>
    <p>住所・天気・地図をまとめて表示</p>
  </div>

  <!-- 検索 -->
  <div class="card">
    <div class="input-wrap">
      <input type="tel" id="zipInput" placeholder="000-0000" maxlength="8" inputmode="numeric" />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
    <button class="search-btn" id="searchBtn">🔍 検索する</button>
  </div>

  <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>

  <!-- 住所 -->
  <div class="card hidden" id="addrCard">
    <div class="addr-zip"  id="addrZip"></div>
    <div class="addr-body">
      <div class="addr-pref" id="addrPref"></div>
      <div class="addr-city" id="addrCity"></div>
      <div class="addr-town" id="addrTown"></div>
    </div>
    <button class="copy-btn" id="copyBtn">📋 住所をコピー</button>
  </div>

  <!-- 天気 -->
  <div class="card hidden" id="weatherCard">
    <div class="weather-title">🌤 現在の天気</div>
    <div class="weather-now">
      <div class="weather-icon-big" id="wIcon"></div>
      <div class="weather-now-info">
        <div class="weather-temp" id="wTemp"></div>
        <div class="weather-desc" id="wDesc"></div>
      </div>
    </div>
    <div class="weather-grid">
      <div class="weather-item">
        <div class="weather-item-label">体感気温</div>
        <div class="weather-item-value" id="wFeel"></div>
      </div>
      <div class="weather-item">
        <div class="weather-item-label">湿度</div>
        <div class="weather-item-value" id="wHumid"></div>
      </div>
      <div class="weather-item">
        <div class="weather-item-label">風速</div>
        <div class="weather-item-value" id="wWind"></div>
      </div>
    </div>
  </div>

  <!-- 地図 -->
  <div class="card hidden" id="mapCard">
    <div class="map-title">🗺 地図</div>
    <div id="map"></div>
  </div>

  <!-- エラー -->
  <div class="error-card" id="errorCard">
    <div class="error-icon">🔍</div>
    <div class="error-text" id="errorText"></div>
  </div>

  <p class="hint">ハイフンあり・なし、どちらでも検索できます</p>
</div>

<script>
  const zipInput  = document.getElementById('zipInput');
  const clearBtn  = document.getElementById('clearBtn');
  const searchBtn = document.getElementById('searchBtn');
  const spinner   = document.getElementById('spinner');
  const copyBtn   = document.getElementById('copyBtn');

  let map = null;
  let marker = null;
  let lastAddress = '';

  // 自動ハイフン
  zipInput.addEventListener('input', () => {
    let v = zipInput.value.replace(/[^\d]/g, '').slice(0, 7);
    zipInput.value = v.length > 3 ? v.slice(0,3) + '-' + v.slice(3) : v;
    clearBtn.classList.toggle('show', zipInput.value.length > 0);
    hideAll();
  });

  zipInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  clearBtn.addEventListener('click', () => {
    zipInput.value = ''; clearBtn.classList.remove('show');
    hideAll(); zipInput.focus();
  });

  searchBtn.addEventListener('click', search);

  async function search() {
    const raw = zipInput.value.replace(/-/g, '');
    if (raw.length !== 7) { showError('7桁の郵便番号を入力してください'); return; }

    hideAll();
    spinner.classList.add('show');
    searchBtn.disabled = true;

    try {
      // 1. 住所取得
      const zRes  = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${raw}`);
      const zJson = await zRes.json();

      if (zJson.status !== 200 || !zJson.results) {
        showError('該当する住所が見つかりませんでした'); return;
      }

      const r    = zJson.results[0];
      const pref = r.address1;
      const city = r.address2;
      const town = r.address3;

      document.getElementById('addrZip').textContent  = `〒 ${raw.slice(0,3)}-${raw.slice(3)}`;
      document.getElementById('addrPref').textContent = pref;
      document.getElementById('addrCity').textContent = city;
      document.getElementById('addrTown').textContent = town;
      lastAddress = pref + city + town;
      copyBtn.textContent = '📋 住所をコピー';
      copyBtn.classList.remove('copied');
      document.getElementById('addrCard').classList.remove('hidden');

      // 2. 緯度経度（zipcloud → なければNominatimでフォールバック）
      let lat = parseFloat(r.latitude);
      let lon = parseFloat(r.longitude);

      if (!lat || !lon) {
        const query = encodeURIComponent(pref + city + town);
        const nRes  = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${query}&countrycodes=jp&format=json&limit=1`,
          { headers: { 'User-Agent': 'zipcode-search-app' } }
        );
        const nJson = await nRes.json();
        if (!nJson.length) { showError('緯度経度の取得に失敗しました'); return; }
        lat = parseFloat(nJson[0].lat);
        lon = parseFloat(nJson[0].lon);
      }

      // 3. 天気取得（Open-Meteo）
      const wRes  = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
        `&timezone=Asia%2FTokyo`
      );
      const wJson = await wRes.json();
      const cur   = wJson.current;

      document.getElementById('wIcon').textContent  = weatherIcon(cur.weather_code);
      document.getElementById('wTemp').textContent  = `${cur.temperature_2m}°C`;
      document.getElementById('wDesc').textContent  = weatherDesc(cur.weather_code);
      document.getElementById('wFeel').textContent  = `${cur.apparent_temperature}°C`;
      document.getElementById('wHumid').textContent = `${cur.relative_humidity_2m}%`;
      document.getElementById('wWind').textContent  = `${cur.wind_speed_10m} m/s`;
      document.getElementById('weatherCard').classList.remove('hidden');

      // 4. 地図表示
      document.getElementById('mapCard').classList.remove('hidden');
      if (!map) {
        map = L.map('map').setView([lat, lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        marker = L.marker([lat, lon]).addTo(map).bindPopup(pref + city + town).openPopup();
      } else {
        map.setView([lat, lon], 15);
        marker.setLatLng([lat, lon]).setPopupContent(pref + city + town).openPopup();
      }
      setTimeout(() => map.invalidateSize(), 100);

    } catch (e) {
      showError('通信エラーが発生しました。しばらくしてお試しください。');
    } finally {
      spinner.classList.remove('show');
      searchBtn.disabled = false;
    }
  }

  // コピー
  copyBtn.addEventListener('click', async () => {
    if (!lastAddress) return;
    try {
      await navigator.clipboard.writeText(lastAddress);
      copyBtn.textContent = '✅ コピーしました！';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '📋 住所をコピー'; copyBtn.classList.remove('copied'); }, 2000);
    } catch { copyBtn.textContent = '⚠️ コピーできませんでした'; }
  });

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorCard').classList.add('show');
  }

  function hideAll() {
    ['addrCard','weatherCard','mapCard'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('errorCard').classList.remove('show');
  }

  // 天気コード → アイコン
  function weatherIcon(code) {
    if (code === 0)              return '☀️';
    if (code <= 2)               return '🌤';
    if (code === 3)              return '☁️';
    if (code <= 49)              return '🌫';
    if (code <= 59)              return '🌦';
    if (code <= 69)              return '🌧';
    if (code <= 79)              return '❄️';
    if (code <= 84)              return '🌧';
    if (code <= 94)              return '🌨';
    return '⛈';
  }

  // 天気コード → 説明
  function weatherDesc(code) {
    if (code === 0)  return '快晴';
    if (code === 1)  return 'ほぼ晴れ';
    if (code === 2)  return '一部曇り';
    if (code === 3)  return '曇り';
    if (code <= 49)  return '霧';
    if (code <= 59)  return '霧雨';
    if (code <= 67)  return '雨';
    if (code <= 69)  return '雨/雪';
    if (code <= 79)  return '雪';
    if (code <= 82)  return 'にわか雨';
    if (code <= 84)  return '強いにわか雨';
    if (code <= 94)  return '雪のにわか降り';
    return '雷雨';
  }
</script>
</body>
</html>
